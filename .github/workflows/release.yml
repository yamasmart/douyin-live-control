name: Release

# 云端打包：Windows / Mac 各自用 electron-builder 打包（只构建不发布），
# 产物上传为 workflow artifact，最后由单独的 publish 作业统一发到一个 GitHub Release。
# 这样避免多平台作业并发各建一个草稿 Release 的竞争问题。
on:
  workflow_dispatch:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run build
      - name: 打包（不发布）
        run: npx --no-install electron-builder --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false # 无 Mac 证书时做未签名构建，避免 CI 失败
      - uses: actions/upload-artifact@v4
        with:
          name: installers-${{ matrix.os }}
          # 安装包 + 自动更新元数据（latest*.yml / blockmap / mac zip，electron-updater 需要）
          path: |
            out/*.exe
            out/*.dmg
            out/*.zip
            out/*.yml
            out/*.blockmap
          if-no-files-found: warn

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - id: ver
        run: echo "v=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: 发布到一个 Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.v }}
          name: v${{ steps.ver.outputs.v }}
          files: artifacts/*
